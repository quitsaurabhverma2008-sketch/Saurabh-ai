<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saurabh AI - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #06060a;
            --bg2: #0a0a12;
            --a: #d4845a;
            --a2: #f0a060;
            --a3: #f5c080;
            --a4: #ffd700;
            --text: #f0ede8;
            --text2: #a09890;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0f0f1a 100%);
            position: relative;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 70%, rgba(212, 132, 90, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(240, 160, 96, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(10, 10, 18, 0.98);
            border: 1px solid rgba(212, 132, 90, 0.3);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(212, 132, 90, 0.15),
                        0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .login-title {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--a), var(--a2), var(--a3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text2);
            font-size: 15px;
            margin-bottom: 36px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 132, 90, 0.2);
            border-radius: 14px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--a);
            box-shadow: 0 0 30px rgba(212, 132, 90, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: var(--text2);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle .input-field {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
        }

        .toggle-password:hover {
            color: var(--a);
        }

        .btn-primary {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--a), var(--a2));
            border: none;
            border-radius: 14px;
            color: var(--bg);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(212, 132, 90, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-primary.loading {
            pointer-events: none;
        }

        .btn-primary .btn-text {
            transition: opacity 0.3s ease;
        }

        .btn-primary.loading .btn-text {
            opacity: 0;
        }

        .btn-primary .loading-spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border: 3px solid rgba(6, 6, 10, 0.3);
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn-primary.loading .loading-spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .btn-secondary {
            width: 100%;
            padding: 16px 24px;
            background: transparent;
            border: 2px solid rgba(212, 132, 90, 0.3);
            border-radius: 14px;
            color: var(--text2);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }

        .btn-secondary:hover {
            border-color: var(--a);
            color: var(--text);
            background: rgba(212, 132, 90, 0.1);
        }

        .error-message, .success-message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.active, .success-message.active {
            display: flex;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .welcome-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--a), var(--a2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-message {
            color: var(--text2);
            font-size: 15px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text2);
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(212, 132, 90, 0.2);
        }

        .divider span {
            padding: 0 16px;
        }

        .footer-text {
            text-align: center;
            color: var(--text2);
            font-size: 13px;
            margin-top: 24px;
        }

        .footer-text a {
            color: var(--a);
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            color: var(--text2);
            font-size: 14px;
            margin-top: 16px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--a);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 20px;
            }
            
            .login-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1 class="login-title">Saurabh AI</h1>
            <p class="login-subtitle" id="loginSubtitle">Sign in to continue</p>

            <div class="error-message" id="errorMessage">
                <span>&#9888;</span>
                <span id="errorText"></span>
            </div>
            <div class="success-message" id="successMessage">
                <span>&#10004;</span>
                <span id="successText"></span>
            </div>

            <div id="loginScreen">
                <div class="input-group">
                    <label class="input-label">&#128231; Email</label>
                    <input type="email" class="input-field" id="emailInput" placeholder="your.email@gmail.com" autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label class="input-label">&#128273; Password</label>
                    <div class="password-toggle">
                        <input type="password" class="input-field" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">&#128065;</button>
                    </div>
                </div>
                
                <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
                    <span class="btn-text">Login</span>
                    <div class="loading-spinner"></div>
                </button>
            </div>

            <div id="registerScreen" style="display: none;">
                <div class="input-group">
                    <label class="input-label">&#128231; Email</label>
                    <input type="email" class="input-field" id="regEmailInput" placeholder="your.email@gmail.com" autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label class="input-label">&#128273; Password</label>
                    <div class="password-toggle">
                        <input type="password" class="input-field" id="regPasswordInput" placeholder="Create a password" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPasswordInput', this)">&#128065;</button>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">&#128273; Confirm Password</label>
                    <div class="password-toggle">
                        <input type="password" class="input-field" id="regConfirmPasswordInput" placeholder="Confirm your password" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPasswordInput', this)">&#128065;</button>
                    </div>
                </div>
                
                <button class="btn-primary" id="registerBtn" onclick="handleRegister()">
                    <span class="btn-text">Create Account</span>
                    <div class="loading-spinner"></div>
                </button>
                
                <span class="back-link" onclick="showLogin()">&#8592; Back to Login</span>
            </div>

            <div id="successScreen" style="display: none;">
                <div class="welcome-screen">
                    <div class="welcome-icon">&#127881;</div>
                    <h1 class="welcome-title" id="successTitle">Welcome!</h1>
                    <p class="welcome-message" id="successMessageText">Loading Saurabh AI...</p>
                </div>
            </div>

            <div id="loginFooter">
                <p class="footer-text" id="footerText">
                    Don't have an account? <a onclick="showRegister()">Create one</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '&#128064;';
            } else {
                input.type = 'password';
                btn.innerHTML = '&#128065;';
            }
        }

        function showLogin() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('registerScreen').style.display = 'none';
            document.getElementById('successScreen').style.display = 'none';
            document.getElementById('loginSubtitle').textContent = 'Sign in to continue';
            document.getElementById('footerText').innerHTML = 'Don\'t have an account? <a onclick="showRegister()">Create one</a>';
            hideMessages();
        }

        function showRegister() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('registerScreen').style.display = 'block';
            document.getElementById('successScreen').style.display = 'none';
            document.getElementById('loginSubtitle').textContent = 'Create your account';
            document.getElementById('footerText').innerHTML = 'Already have an account? <a onclick="showLogin()">Login</a>';
            hideMessages();
        }

        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            document.getElementById('successMessage').classList.add('active');
            document.getElementById('errorMessage').classList.remove('active');
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.add('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('successMessage').classList.remove('active');
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
            } else {
                btn.classList.remove('loading');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (!password) {
                showError('Please enter your password');
                return;
            }
            
            setLoading('loginBtn', true);
            hideMessages();
            
            try {
                const response = await fetch(API_BASE + '/auth/login-with-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showError(data.detail || data.message || 'Login failed');
                    setLoading('loginBtn', false);
                    return;
                }
                
                localStorage.setItem('saurabh_token', data.token);
                localStorage.setItem('saurabh_email', data.email);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('loginFooter').style.display = 'none';
                document.getElementById('successTitle').textContent = 'Welcome back!';
                document.getElementById('successMessageText').textContent = 'Loading Saurabh AI...';
                document.getElementById('successScreen').style.display = 'block';
                document.getElementById('loginSubtitle').textContent = '';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
                
            } catch (error) {
                showError('Login failed. Please check your internet connection.');
                setLoading('loginBtn', false);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('regEmailInput').value.trim().toLowerCase();
            const password = document.getElementById('regPasswordInput').value;
            const confirmPassword = document.getElementById('regConfirmPasswordInput').value;
            
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (!password) {
                showError('Please enter a password');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            setLoading('registerBtn', true);
            hideMessages();
            
            try {
                const response = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showError(data.detail || data.message || 'Registration failed');
                    setLoading('registerBtn', false);
                    return;
                }
                
                localStorage.setItem('saurabh_token', data.token);
                localStorage.setItem('saurabh_email', data.email);
                
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('loginFooter').style.display = 'none';
                document.getElementById('successTitle').textContent = 'Welcome!';
                document.getElementById('successMessageText').textContent = 'Your account has been created successfully!';
                document.getElementById('successScreen').style.display = 'block';
                document.getElementById('loginSubtitle').textContent = '';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
                
            } catch (error) {
                showError('Registration failed. Please check your internet connection.');
                setLoading('registerBtn', false);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        document.getElementById('regConfirmPasswordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
